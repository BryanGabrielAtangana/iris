name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build:
    name: build / node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  accuracy:
    name: search accuracy (semantic vs lexical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Cache the transformers.js model weights so the ~23MB download happens
      # at most once. The path must match where transformers.js actually writes
      # (pinned via IRIS_MODEL_CACHE) or the save is a no-op and every run
      # re-downloads and trips HF 429s. Restore/save are split so we only save a
      # *complete* download — caching a failed/partial fetch would poison the key
      # and lock every future run onto the lexical fallback.
      - name: Restore embedding model cache
        id: model-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.model-cache
          key: iris-embedding-model-all-MiniLM-L6-v2-onnx

      - name: Run accuracy benchmark (downloads the model on first run)
        env:
          IRIS_MODEL_CACHE: ${{ github.workspace }}/.model-cache
        run: pnpm --filter @iris-sylvia/evals accuracy

      - name: Run fusion bench-off (per subset, picks the default ranker)
        env:
          IRIS_MODEL_CACHE: ${{ github.workspace }}/.model-cache
        run: pnpm --filter @iris-sylvia/evals benchoff

      - name: Calibrate abstention (rejection-recall @ precision ≥ 95%)
        env:
          IRIS_MODEL_CACHE: ${{ github.workspace }}/.model-cache
        run: pnpm --filter @iris-sylvia/evals abstain

      - name: Save embedding model cache
        # Only when not already cached AND the real ONNX weights are present, so a
        # transient fetch failure can never persist an empty cache.
        if: >-
          steps.model-cache.outputs.cache-hit != 'true' &&
          hashFiles(format('{0}/.model-cache/**/*.onnx', github.workspace)) != ''
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.model-cache
          key: iris-embedding-model-all-MiniLM-L6-v2-onnx
