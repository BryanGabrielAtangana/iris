name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build:
    name: build / node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  accuracy:
    name: search accuracy (semantic vs lexical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Cache the transformers.js model weights so the ~23MB download happens
      # at most once (the GitHub runner can reach huggingface.co; restricted
      # sandboxes cannot, which is why this measurement lives in CI). The path
      # must match where transformers.js actually writes — pinned below via
      # IRIS_MODEL_CACHE — otherwise the save is a no-op and every run
      # re-downloads and hits HF 429 rate limits.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.model-cache
          key: iris-embedding-model-all-MiniLM-L6-v2

      - name: Run accuracy benchmark (downloads the model on first run)
        env:
          IRIS_MODEL_CACHE: ${{ github.workspace }}/.model-cache
        run: pnpm --filter @iris-sylvia/evals accuracy
